<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netflix Soporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@300;400;500;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --red: #E50914;
        --red-dark: #B81D24;
        --red-glow: rgba(229, 9, 20, 0.25);
        --bg: #141414;
        --surface: #1F1F1F;
        --surface2: #2A2A2A;
        --border: rgba(255,255,255,0.08);
        --text: #E5E5E5;
        --text-muted: #8C8C8C;
        --white: #FFFFFF;
        --user-bubble: #E50914;
        --agent-bubble: #2A2A2A;
        --radius: 18px;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        overflow: hidden;
      }

      /* Cinematic background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 50% at 10% 0%, rgba(229,9,20,0.12) 0%, transparent 60%),
          radial-gradient(ellipse 40% 40% at 90% 100%, rgba(229,9,20,0.08) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      .chat-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        height: 100vh;
        max-height: 780px;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(229,9,20,0.1),
          0 32px 80px rgba(0,0,0,0.7),
          0 0 60px rgba(229,9,20,0.05);
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Header */
      .chat-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 20px 24px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        position: relative;
        flex-shrink: 0;
      }

      .chat-header::after {
        content: '';
        position: absolute;
        bottom: 0; left: 24px; right: 24px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(229,9,20,0.4), transparent);
      }

      .header-logo {
        font-size: 26px;
        font-weight: 900;
        color: var(--red);
        letter-spacing: -1px;
        font-family: 'DM Sans', sans-serif;
        line-height: 1;
      }

      .header-divider {
        width: 1px;
        height: 24px;
        background: var(--border);
      }

      .header-info { flex: 1; }

      .header-info h2 {
        font-size: 14px;
        font-weight: 500;
        color: var(--white);
        letter-spacing: 0.01em;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 3px;
      }

      .status-dot {
        width: 7px; height: 7px;
        background: #4ADE80;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 6px rgba(74, 222, 128, 0.5);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .status-text {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 300;
      }

      .header-badge {
        background: rgba(229,9,20,0.15);
        border: 1px solid rgba(229,9,20,0.3);
        color: var(--red);
        font-size: 10px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 20px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* Avatar */
      .avatar {
        width: 40px; height: 40px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--red-dark), var(--red));
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        box-shadow: 0 4px 12px var(--red-glow);
      }

      /* Messages area */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
      }

      .chat-messages::-webkit-scrollbar { width: 4px; }
      .chat-messages::-webkit-scrollbar-track { background: transparent; }
      .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      /* Message bubbles */
      .message-row {
        display: flex;
        gap: 10px;
        animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes msgIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .message-row.user {
        flex-direction: row-reverse;
      }

      .msg-avatar {
        width: 32px; height: 32px;
        border-radius: 10px;
        background: var(--surface2);
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        align-self: flex-end;
      }

      .message-row.user .msg-avatar {
        background: rgba(229,9,20,0.2);
        border: 1px solid rgba(229,9,20,0.3);
      }

      .bubble-wrap { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
      .message-row.user .bubble-wrap { align-items: flex-end; }

      .bubble {
        padding: 11px 16px;
        border-radius: var(--radius);
        font-size: 14px;
        line-height: 1.5;
        font-weight: 300;
        position: relative;
        word-break: break-word;
      }

      .message-row.agent .bubble {
        background: var(--agent-bubble);
        color: var(--text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 6px;
      }

      .message-row.user .bubble {
        background: var(--user-bubble);
        color: var(--white);
        font-weight: 400;
        border-bottom-right-radius: 6px;
        box-shadow: 0 4px 16px rgba(229,9,20,0.3);
      }

      .msg-time {
        font-size: 10px;
        color: var(--text-muted);
        padding: 0 4px;
        font-weight: 300;
      }

      /* Timestamp separator */
      .time-separator {
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0.5;
      }

      .time-separator::before,
      .time-separator::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .time-separator span {
        font-size: 10px;
        color: var(--text-muted);
        white-space: nowrap;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* Typing indicator */
      .typing-indicator {
        display: none;
        gap: 10px;
        animation: msgIn 0.3s ease forwards;
      }

      .typing-indicator.active { display: flex; }

      .typing-dots {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 14px 18px;
        background: var(--agent-bubble);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        border-bottom-left-radius: 6px;
      }

      .typing-dots span {
        width: 6px; height: 6px;
        background: var(--text-muted);
        border-radius: 50%;
        animation: bounce 1.2s ease-in-out infinite;
      }

      .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-6px); opacity: 1; }
      }

      /* Input area */
      .chat-input-area {
        padding: 16px 20px 20px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        position: relative;
        flex-shrink: 0;
      }

      .chat-input-area::before {
        content: '';
        position: absolute;
        top: 0; left: 20px; right: 20px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(229,9,20,0.3), transparent);
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 6px 6px 6px 16px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .input-row:focus-within {
        border-color: rgba(229,9,20,0.5);
        box-shadow: 0 0 0 3px rgba(229,9,20,0.08);
      }

      #ingreso-usuario {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 300;
        line-height: 1.5;
        resize: none;
        min-height: 36px;
        max-height: 100px;
        padding: 6px 0;
      }

      #ingreso-usuario::placeholder { color: var(--text-muted); }

      #boton-enviar {
        width: 40px; height: 40px;
        border-radius: 12px;
        background: var(--red);
        border: none;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(229,9,20,0.3);
      }

      #boton-enviar:hover:not(:disabled) {
        background: #F40612;
        box-shadow: 0 6px 20px rgba(229,9,20,0.5);
        transform: translateY(-1px);
      }

      #boton-enviar:active:not(:disabled) { transform: translateY(0); }

      #boton-enviar:disabled {
        background: var(--surface2);
        box-shadow: none;
        cursor: not-allowed;
        opacity: 0.5;
      }

      #boton-enviar svg { pointer-events: none; }

      /* Quick suggestions */
      .quick-suggestions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .suggestion-chip {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 12px;
        font-family: 'DM Sans', sans-serif;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-weight: 300;
      }

      .suggestion-chip:hover {
        background: rgba(229,9,20,0.1);
        border-color: rgba(229,9,20,0.4);
        color: var(--text);
      }

      @media (max-width: 500px) {
        .chat-wrapper { border-radius: 0; max-height: 100vh; border: none; }
      }
    </style>
  </head>
  <body>
    <div class="chat-wrapper">
      <!-- Header -->
      <div class="chat-header">
        <div class="header-logo">N</div>
        <div class="header-divider"></div>
        <div class="header-info">
          <h2>Centro de Soporte</h2>
          <div class="status-row">
            <div class="status-dot"></div>
            <span class="status-text">Asistente disponible</span>
          </div>
        </div>
        <div class="header-badge">Live</div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="ventana-chat">
        <div class="time-separator"><span>Hoy · Ahora</span></div>

        <div class="message-row agent">
          <div class="msg-avatar">🎬</div>
          <div class="bubble-wrap">
            <div class="bubble">
              ¡Hola! Soy tu asistente de Netflix. ¿En qué puedo ayudarte hoy? 😊
            </div>
            <span class="msg-time" id="init-time"></span>
          </div>
        </div>

        <!-- Typing indicator -->
        <div class="message-row typing-indicator" id="typing-indicator">
          <div class="msg-avatar">🎬</div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="quick-suggestions" id="sugerencias">
          <button class="suggestion-chip">¿Cómo cancelar?</button>
          <button class="suggestion-chip">Problemas de pago</button>
          <button class="suggestion-chip">Cambiar contraseña</button>
          <button class="suggestion-chip">Planes disponibles</button>
        </div>
        <div class="input-row">
          <input type="text" id="ingreso-usuario" placeholder="Escribe tu mensaje...">
          <button id="boton-enviar" title="Enviar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      let historialChat = [];
      const botonEnviar = document.getElementById("boton-enviar");
      const ventanaChat = document.getElementById("ventana-chat");
      const ingresoUsuario = document.getElementById("ingreso-usuario");
      const typingIndicator = document.getElementById("typing-indicator");
      const sugerencias = document.getElementById("sugerencias");

      // Set initial time
      document.getElementById("init-time").textContent = getTime();

      function getTime() {
        return new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
      }

      function addMessage(text, role) {
        const time = getTime();
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "msg-avatar";
        avatar.textContent = role === 'agent' ? '🎬' : '👤';

        const wrap = document.createElement("div");
        wrap.className = "bubble-wrap";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        const timeEl = document.createElement("span");
        timeEl.className = "msg-time";
        timeEl.textContent = time;

        wrap.appendChild(bubble);
        wrap.appendChild(timeEl);

        if (role === 'user') {
          row.appendChild(wrap);
          row.appendChild(avatar);
        } else {
          row.appendChild(avatar);
          row.appendChild(wrap);
        }

        ventanaChat.insertBefore(row, typingIndicator);
        ventanaChat.scrollTop = ventanaChat.scrollHeight;
      }

      function showTyping(show) {
        typingIndicator.classList.toggle("active", show);
        if (show) ventanaChat.scrollTop = ventanaChat.scrollHeight;
      }

      async function sendMessage(text) {
        if (!text) return;
        sugerencias.style.display = 'none';
        addMessage(text, 'user');
        ingresoUsuario.value = "";
        botonEnviar.disabled = true;
        showTyping(true);

        try {
          const response = await fetch("http://localhost:3000/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mensaje: text, historial: historialChat })
          });
          const data = await response.json();
          showTyping(false);
          addMessage(data.texto, 'agent');
          historialChat.push({ role: "user", parts: [{ text }] });
          historialChat.push({ role: "model", parts: [{ text: data.texto }] });
        } catch (error) {
          showTyping(false);
          addMessage("Ocurrió un error al conectar. Por favor intenta de nuevo.", 'agent');
        } finally {
          botonEnviar.disabled = false;
          ingresoUsuario.focus();
        }
      }

      botonEnviar.addEventListener("click", () => {
        const msg = ingresoUsuario.value.trim();
        if (msg) sendMessage(msg);
      });

      ingresoUsuario.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          const msg = ingresoUsuario.value.trim();
          if (msg) sendMessage(msg);
        }
      });

      document.querySelectorAll(".suggestion-chip").forEach(chip => {
        chip.addEventListener("click", () => sendMessage(chip.textContent));
      });
    </script>
  </body>
</html>
